name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install E2E dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Build icons
        run: npm run icons

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test

      - name: Test MCP server
        run: npm run test:mcp

      - name: Build Electron app for E2E
        run: npm run test:e2e:build

      # electron-forge can exit 0 without packaging anything (e.g. the
      # yauzl@2 silent failure on Node 24.16+, electron/forge#4277), so
      # assert the packaged app actually exists.
      - name: Check packaged app output
        run: test -x out/Armin-linux-x64/Armin

      - name: Run E2E tests
        run: xvfb-run --auto-servernum npm run test:e2e

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          if-no-files-found: ignore
