name: CI

on:
  pull_request:
    branches:
      - master
  workflow_call:

# Cancel superseded runs on the same branch/PR. A new push cancels the
# in-progress run for the same ref so only the latest commit is verified.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install E2E dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Build icons
        run: npm run icons --workspace apps/desktop

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm run test --workspace apps/desktop

      - name: Test MCP server
        run: npm run test:mcp --workspace apps/desktop

      - name: Build Electron app for E2E
        run: npm run test:e2e:build --workspace apps/desktop

      - name: Check packaged app output
        run: npm run check:package --workspace apps/desktop

      - name: Run E2E tests
        run: xvfb-run --auto-servernum npm run test:e2e --workspace apps/desktop

      - name: Upload E2E artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: apps/desktop/test-results/
          if-no-files-found: ignore
