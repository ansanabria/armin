name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_mode:
        description: "Release mode"
        required: true
        type: choice
        default: fast
        options:
          - fast
          - full

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      oses: ${{ steps.release.outputs.oses }}
      prerelease: ${{ steps.release.outputs.prerelease }}
      release_mode: ${{ steps.release.outputs.release_mode }}
    steps:
      - name: Select release mode
        id: release
        shell: bash
        run: |
          release_mode="${{ inputs.release_mode }}"
          prerelease=false

          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${GITHUB_REF_NAME}"
            if [[ "${tag}" == *-alpha ]]; then
              release_mode="fast"
              prerelease=true
            elif [[ "${tag}" == *-beta ]]; then
              release_mode="full"
              prerelease=true
            else
              release_mode="full"
              prerelease=false
            fi
          elif [ "${release_mode}" = "fast" ]; then
            prerelease=true
          fi

          echo "release_mode=${release_mode}" >> "$GITHUB_OUTPUT"

          if [ "${release_mode}" = "full" ]; then
            echo 'oses=["ubuntu-latest","windows-latest","macos-latest"]' >> "$GITHUB_OUTPUT"
          else
            echo 'oses=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
          fi

          echo "prerelease=${prerelease}" >> "$GITHUB_OUTPUT"

  verify:
    name: Verify
    needs: prepare
    if: ${{ needs.prepare.outputs.release_mode == 'full' }}
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish (${{ matrix.os }})
    needs:
      - prepare
      - verify
    if: ${{ always() && needs.prepare.result == 'success' && (needs.verify.result == 'success' || needs.verify.result == 'skipped') }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # Each matrix job publishes to the same GitHub release, so serialize them
      # to avoid races when the release is created or refreshed.
      max-parallel: 1
      matrix:
        os: ${{ fromJSON(needs.prepare.outputs.oses) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Linux AppImage dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools

      - name: Install dependencies
        run: npm ci

      - name: Build icons
        run: npm run icons

      - name: Record publish start time
        shell: bash
        run: echo "PUBLISH_STARTED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_ENV"

      - name: Publish artifacts
        run: npm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_PRERELEASE: ${{ needs.prepare.outputs.prerelease }}

      # electron-forge publish can exit 0 without uploading anything (e.g.
      # the yauzl@2 silent failure on Node 24.16+, electron/forge#4277), so
      # fail unless this job actually created or refreshed release assets.
      - name: Verify release assets were uploaded
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="v$(node -p "require('./apps/desktop/package.json').version")"
          uploaded=$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${tag}" \
            --jq "[.assets[] | select(.updated_at >= \"${PUBLISH_STARTED_AT}\")] | length")
          if [ "${uploaded}" -eq 0 ]; then
            echo "::error::Publish exited 0 but no assets on ${tag} were created or updated after ${PUBLISH_STARTED_AT}."
            exit 1
          fi
          echo "${uploaded} asset(s) uploaded to ${tag}."
