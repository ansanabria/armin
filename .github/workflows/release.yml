name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install E2E dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Build icons
        run: npm run icons

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Test MCP server
        run: npm run test:mcp

      - name: Build Electron app for E2E
        run: npm run test:e2e:build

      - name: Run E2E tests
        run: xvfb-run --auto-servernum npm run test:e2e

  publish:
    name: Publish (${{ matrix.os }})
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Linux AppImage dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools

      - name: Install dependencies
        run: npm ci

      - name: Build icons
        run: npm run icons

      - name: Publish artifacts
        run: npm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
