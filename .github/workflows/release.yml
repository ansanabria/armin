name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    name: Verify
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish (${{ matrix.os }})
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install Linux AppImage dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools

      - name: Install dependencies
        run: npm ci

      - name: Build icons
        run: npm run icons

      - name: Publish artifacts
        run: npm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
