name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Electron binary
        run: npx install-electron --no

      - name: Diagnose Electron binary
        shell: bash
        run: |
          set -uxo pipefail
          node -p "process.version"
          node -p "require('electron/package.json').version"
          command -v install-electron || true
          command -v electron || true
          ls -la node_modules/.bin | grep electron || true
          ls -la node_modules/electron
          if test -f node_modules/electron/path.txt; then
            cat node_modules/electron/path.txt
          else
            echo "node_modules/electron/path.txt is missing"
          fi
          find node_modules/electron/dist -maxdepth 3 -print | sort | head -120 || true
          node -e "const fs = require('node:fs'); const electron = require('electron'); console.log(electron); if (!fs.existsSync(electron)) throw new Error(`${electron} does not exist`)"

      - name: Install E2E dependencies
        run: sudo apt-get update && sudo apt-get install -y xvfb

      - name: Build icons
        run: npm run icons

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Test MCP server
        run: npm run test:mcp

      - name: Build Electron app for E2E
        run: npm run test:e2e:build

      - name: Verify Electron binary after packaging
        run: node -e "const fs = require('node:fs'); const electron = require('electron'); if (!fs.existsSync(electron)) throw new Error(`${electron} does not exist`); console.log(electron)"

      - name: Run E2E tests
        run: xvfb-run --auto-servernum npm run test:e2e

  publish:
    name: Publish (${{ matrix.os }})
    needs: verify
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install Linux AppImage dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools

      - name: Install dependencies
        run: npm ci

      - name: Install Electron binary
        run: npx install-electron --no

      - name: Diagnose Electron binary
        shell: bash
        run: |
          set -uxo pipefail
          node -p "process.version"
          node -p "require('electron/package.json').version"
          command -v install-electron || true
          command -v electron || true
          ls -la node_modules/.bin | grep electron || true
          ls -la node_modules/electron
          if test -f node_modules/electron/path.txt; then
            cat node_modules/electron/path.txt
          else
            echo "node_modules/electron/path.txt is missing"
          fi
          find node_modules/electron/dist -maxdepth 3 -print | sort | head -120 || true
          node -e "const fs = require('node:fs'); const electron = require('electron'); console.log(electron); if (!fs.existsSync(electron)) throw new Error(`${electron} does not exist`)"

      - name: Build icons
        run: npm run icons

      - name: Publish artifacts
        run: npm run publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
